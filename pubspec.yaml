name: modern_weather
description: "A premium Flutter weather app with animations, dark mode, and city imagery."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/animations/
